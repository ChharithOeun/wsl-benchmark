name: CI -- Cross-Platform

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + pytest + numpy
        run: pip install -e . pytest numpy

      - name: Test import
        run: python -c "import wsl_benchmark; print('version:', wsl_benchmark.__version__)"

      - name: Test CLI help
        run: python -m wsl_benchmark --help

      - name: Test CLI version
        run: python -m wsl_benchmark --version

      - name: Test CPU-only benchmark (table output)
        run: python -m wsl_benchmark --ops matmul --size 128 --warmup 1 --runs 2

      - name: Test CPU-only benchmark (JSON output)
        run: python -m wsl_benchmark --ops matmul --size 128 --warmup 1 --runs 2 --json

      - name: Test invalid op exits 1
        shell: bash
        run: |
          python -m wsl_benchmark --ops bad_op && exit 1 || exit 0

      - name: Test all ops CPU-only
        run: python -m wsl_benchmark --ops matmul,fft --size 64 --warmup 1 --runs 1

      - name: Run pytest
        run: python -m pytest tests/ -v --tb=short
